<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário de Jogador</title>
</head>
<body>
    <main class=" container-formulario">
        <div class="titulo-formulario">
            <h1>Formulário de Inscrição</h1>
            <p>Preencha o formulário abaixo para se inscrever no Unimar FC</p>
        </div>

        <form class="formulario-grupo">
                <div class="formulario-individual">
                    <label for="nome">Digite seu nome completo:</label>
                    <input type="text" id="nome" name="nome" placeholder="João Ricardo da Silva" required>
                </div>

                <div class="formulario-individual">
                    <label for="idade">Digite sua idade:</label>
                    <input type="number" id="idade" name="idade" placeholder="25" required>
                </div>

                <div class="formulario-individual">
                    <label for="cidade_estado">Digite sua cidade e estado:</label>
                    <input type="text" id="cidade_estado" name="cidade_estado" placeholder="São Paulo(SP)" required>
                </div>

                <div class="formulario-individual">
                    <label for="ea_id">Digite seu EA ID/PSN/Xbox:</label>
                    <input type="text" id="ea_id" name="ea_id" placeholder="João Ricardo da Silva" required>
                </div>

                <div class="formulario-individual">
                    <label for="plataforma">Selecione sua plataforma:</label>
                    <select id="plataforma" name="plataforma" required>
                        <option value="psn">PlayStation Network (PSN)</option>
                        <option value="xbox">Xbox Live</option>
                        <option value="pc">EA ID</option>
                    </select>
                </div>


            <div class="titulo-formulario2">
                <h1>Perfil do Jogador</h1>
            </div>

            <div class="formulario-grupo2">
                <div class="formulario-individual">
                    <label for="posicao-principal">Selecione sua posição:</label>
                    <select id="posicao-principal" name="posicao-principal" required>
                        <option value="atacante">ATA</option>
                        <option value="ponta-direita">PD</option>
                        <option value="ponta-esquerda">PE</option>
                        <option value="meio-campo">MEI</option>
                        <option value="meio-central">MC</option>
                        <option value="meia-direita">MD</option>
                        <option value="meia-esquerda">ME</option>
                        <option value="volante">VOL</option>
                        <option value="defensor">DEF</option>
                        <option value="lateral-esquerdo">LE</option>
                        <option value="lateral-direito">LD</option>
                        <option value="goleiro">GOL</option>
                    </select>
                </div>

                <div class="formulario-individual">
                    <label for="posicao-secundaria">Selecione sua posição secundária:</label>
                    <select id="posicao-secundaria" name="posicao-secundaria" required>
                        <option value="atacante">ATA</option>
                        <option value="ponta-direita">PD</option>
                        <option value="ponta-esquerda">PE</option>
                        <option value="meio-campo">MEI</option>
                        <option value="meio-central">MC</option>
                        <option value="meia-direita">MD</option>
                        <option value="meia-esquerda">ME</option>
                        <option value="volante">VOL</option>
                        <option value="defensor">DEF</option>
                        <option value="lateral-esquerdo">LE</option>
                        <option value="lateral-direito">LD</option>
                        <option value="goleiro">GOL</option>
                    </select>
                </div>

                <div class="formulario-individual">
                    <label for="overall">Digite seu overall:</label>
                    <input type="number" id="overall" name="overall" placeholder="85" required>
                </div>

                <div class="formulario-individual">
                    <label for="estilodejogo">Digite seu estilo de jogo:</label>
                    <input type="text" id="estilodejogo" name="estilodejogo" placeholder="ofensivo, defensivo" required>
                </div>
            </div>

            <div class="titulo-formulario3">
                <h1>Experiência</h1>
            </div>

            <div class="formulario-grupo3">
                <div class="formulario-individual">
                    <label for="time-clube">Já jogou em algum time/clube?</label>
                    <select id="time-clube" name="time-clube" required>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>

                <div class="formulario-individual">
                    <label for="tempojogo">Digite seu tempo de jogo:</label>
                    <input type="number" id="tempojogo" name="tempojogo" placeholder="5 anos" required>
                </div>

                <div class="formulario-individual">
                    <label for="campeonato">Já participou de Campeonato?</label>
                    <select id="campeonato" name="campeonato" required>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="titulo-formulario4">
                <h1>Comunicação</h1>
            </div>
            
            <div class="formulario-grupo4">
                <div class="formulario-individual">
                    <label for="discord">Possui discord?</label>
                    <select id="discord" name="discord" required>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>

                <div class="formulario-individual">
                    <label for="discord-usuario">Digite seu nome de Usuario do discord:</label>
                    <input type="text" id="discord-usuario" name="discord-usuario" placeholder="SeuUsuario#12340" required>
                </div>

                <div class="formulario-individual">
                    <label for="microfone">Possui microfone?</label>
                    <select id="microfone" name="microfone" required>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>
            </div>

            <div class="titulo-formulario5">
                <h1>Comprometimento</h1>
            </div>

            <div class="formulario-grupo5">
                <div class="formulario-individual">
                    <label for="taticas">Você está disposto a jogar em equipe e seguir táticas?</label>
                    <select id="taticas" name="taticas" required>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>

                <div class="formulario-individual">
                    <label for="criticas">Aceita críticas e busca melhorar?</label>
                    <select id="criticas" name="criticas" required>
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>

                <div class="formulario-individual">
                    <label for="motivacao">Por que quer entrar no Unimar FC?</label>
                    <textarea id="motivacao" name="motivacao" placeholder="Escreva sua motivação para entrar no time..." required></textarea>
                    
                </div>

                <div class=" botao-formulario">
                    <button type="submit">Enviar</button>
                </div>
            </div>
        </form>

    </main>

    
</body>
</html>
